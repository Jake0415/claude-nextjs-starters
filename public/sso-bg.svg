<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 그라데이션 -->
  <rect width="800" height="900" fill="url(#bgGrad)"/>

  <!-- 장식 원형 패턴들 -->
  <circle cx="650" cy="150" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="700" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="800" r="150" fill="rgba(255,255,255,0.02)"/>

  <!-- 중앙 SSO 통합 다이어그램 -->
  <!-- 중심 허브 -->
  <circle cx="400" cy="420" r="70" fill="url(#circleGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="2" filter="url(#softGlow)"/>
  <circle cx="400" cy="420" r="50" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

  <!-- 허브 안의 열쇠 아이콘 -->
  <g transform="translate(400,420)" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="-8" r="10"/>
    <line x1="0" y1="2" x2="0" y2="18"/>
    <line x1="0" y1="12" x2="6" y2="12"/>
    <line x1="0" y1="18" x2="6" y2="18"/>
  </g>

  <!-- 연결된 서비스 노드들 -->
  <!-- 상단 노드 -->
  <line x1="400" y1="350" x2="400" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="400" cy="210" r="35" fill="url(#circleGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <g transform="translate(400,210)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
    <rect x="-12" y="-10" width="24" height="20" rx="2"/>
    <line x1="-8" y1="-4" x2="8" y2="-4"/>
    <line x1="-8" y1="0" x2="4" y2="0"/>
    <line x1="-8" y1="4" x2="6" y2="4"/>
  </g>

  <!-- 우상단 노드 -->
  <line x1="450" y1="370" x2="560" y2="280" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="580" cy="265" r="35" fill="url(#circleGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <g transform="translate(580,265)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
    <circle cx="0" cy="-4" r="8"/>
    <path d="M-12 12 C-12 4 -8 0 0 0 C8 0 12 4 12 12"/>
  </g>

  <!-- 우하단 노드 -->
  <line x1="450" y1="470" x2="560" y2="560" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="580" cy="580" r="35" fill="url(#circleGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <g transform="translate(580,580)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
    <rect x="-10" y="-12" width="20" height="24" rx="3"/>
    <line x1="-4" y1="8" x2="4" y2="8"/>
  </g>

  <!-- 좌하단 노드 -->
  <line x1="350" y1="470" x2="240" y2="560" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="220" cy="580" r="35" fill="url(#circleGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <g transform="translate(220,580)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
    <path d="M-10 -8 L0 -14 L10 -8 L10 8 L-10 8Z"/>
    <rect x="-3" y="0" width="6" height="8"/>
  </g>

  <!-- 좌상단 노드 -->
  <line x1="350" y1="370" x2="240" y2="280" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="220" cy="265" r="35" fill="url(#circleGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <g transform="translate(220,265)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
    <circle cx="0" cy="0" r="12"/>
    <path d="M0 -12 L0 -6 M0 6 L0 12 M-12 0 L-6 0 M6 0 L12 0"/>
  </g>

  <!-- 외곽 궤도 링 -->
  <circle cx="400" cy="420" r="200" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="400" cy="420" r="160" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- 작은 장식 점들 -->
  <circle cx="300" cy="300" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="520" cy="350" r="2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="280" cy="480" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="530" cy="500" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="350" cy="550" r="1.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="470" cy="300" r="1.5" fill="rgba(255,255,255,0.25)"/>

  <!-- 하단 물결 장식 -->
  <path d="M0 800 Q200 770 400 800 Q600 830 800 800 L800 900 L0 900Z" fill="rgba(255,255,255,0.03)"/>
  <path d="M0 830 Q200 810 400 840 Q600 870 800 830 L800 900 L0 900Z" fill="rgba(255,255,255,0.02)"/>
</svg>